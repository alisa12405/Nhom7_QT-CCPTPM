name: CI/CD — PHP Docker Basic

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: CI — Kiểm tra PHP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring

      - name: Kiểm tra cú pháp các file PHP
        shell: bash
        run: |
          has_error=0
          while IFS= read -r -d '' file; do
            output=$(php -l "$file" 2>&1)
            status=$?
            if [ "$status" -ne 0 ]; then
              echo "::error file=$file::PHP syntax error detected"
              echo "$output"
              has_error=1
            else
              echo "OK: $file"
            fi
          done < <(find . -name "*.php" -not -path "./.git/*" -print0)
          if [ "$has_error" -eq 1 ]; then
            echo "Phát hiện file PHP lỗi cú pháp! Dừng workflow."
            exit 1
          else
            echo "Tất cả file PHP đều hợp lệ."
            exit 0
          fi

  cd:
    name: CD — Deploy qua Cloudflare Tunnel
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài đặt cloudflared
        shell: bash
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Cấu hình SSH Client và Cloudflare Access
        shell: bash
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host ssh.hmmh.click
              User ${{ secrets.SSH_USER }}
              IdentityFile ~/.ssh/id_ed25519
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              ProxyCommand cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy — Pull code và restart Docker
        shell: bash
        run: |
          ssh -T ssh.hmmh.click << 'ENDSSH'
            cd ~/hotelbooking || exit 1
            echo "=== Đang kéo code mới từ GitHub ==="
            git pull origin main
            
            echo "=== Đang khởi động lại Docker Containers ==="
            docker compose down
            docker compose up -d --build
            
            echo "=== Dọn dẹp Docker Images cũ ==="
            docker image prune -f
            
            echo "Deploy hoàn tất thành công!"
          ENDSSH
