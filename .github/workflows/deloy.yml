name: CI/CD — PHP Docker Basic

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: CI — Kiểm tra PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring

      - name: Kiểm tra cú pháp các file PHP
        run: |
          ERROR=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "::warning file=$file::PHP syntax error"
              php -l "$file"
              ERROR=1
            else
              echo "OK: $file"
            fi
          done < <(find . -name "*.php" -not -path "./.git/*" -print0)

          if [ "$ERROR" -ne 0 ]; then
            echo "Có file PHP lỗi cú pháp."
          else
            echo "Tất cả file PHP đều hợp lệ."
          fi

          exit 0


  cd:
    name: CD — Deploy qua Cloudflare Tunnel
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] \
            https://pkg.cloudflare.com/cloudflared $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update && sudo apt-get install -y cloudflared

      - name: Cấu hình SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Cấu hình SSH ProxyCommand qua Cloudflare Tunnel
        run: |
          cat >> ~/.ssh/config <<EOF
          Host ssh.hmmh.click
            ProxyCommand cloudflared access ssh --hostname %h \
              --id ${{ secrets.CF_ACCESS_CLIENT_ID }} \
              --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Deploy — Pull code và restart Docker
        run: |
          ssh ${{ secrets.SSH_USER }}@ssh.hmmh.click << 'ENDSSH'
            cd ~/hotelbooking
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "Deploy hoàn tất."
          ENDSSH
