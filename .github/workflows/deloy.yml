name: CI/CD — HotelBooking Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ════════════════════════
  # JOB 1: CI — Kiểm tra code
  # ════════════════════════
  lint:
    name: "🔍 CI — Kiểm tra PHP"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring

      - name: Kiểm tra cú pháp từng file PHP
        run: |
          ERROR=0
          for file in $(find . -name "*.php" -not -path "./.git/*"); do
            OUTPUT=$(php -l "$file" 2>&1)
            if [ $? -ne 0 ]; then
              echo "❌ Lỗi cú pháp: $file"
              echo "$OUTPUT"
              ERROR=1
            else
              echo "✅ OK: $file"
            fi
          done
          if [ $ERROR -ne 0 ]; then
            echo "Có file PHP bị lỗi cú pháp, dừng pipeline."
            exit 1
          fi

      - name: Kiểm tra file config mẫu tồn tại
        run: |
          if [ ! -f "api/config/config.example.php" ]; then
            echo "❌ Thiếu config.example.php"
            exit 1
          fi
          echo "✅ config.example.php tồn tại"

  # ════════════════════════
  # JOB 2: CD — Deploy
  # ════════════════════════
  deploy:
    name: "🚀 CD — Deploy lên Server"
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug — Kiểm tra SSH key có hợp lệ không
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/test_key
          chmod 600 /tmp/test_key
          ssh-keygen -l -f /tmp/test_key && echo "✅ Key hợp lệ" || echo "❌ Key lỗi định dạng"
          head -1 /tmp/test_key
          tail -1 /tmp/test_key
          rm /tmp/test_key

      - name: Thiết lập SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy code lên server (rsync)
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='api/config/config.php' \
            --exclude='docker-compose.yml' \
            --exclude='db_init/' \
            --exclude='.env' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.WORK_DIR }}/

      - name: Backup image hiện tại (rollback point)
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker tag hotelbooking-web:latest hotelbooking-web:backup 2>/dev/null || true"

      - name: Build image mới và deploy
        id: deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'SSHEOF'
            set -e
            cd ${{ secrets.WORK_DIR }}
            echo "📦 Build image mới..."
            docker compose build web
            echo "🚀 Khởi động container..."
            docker compose up -d --force-recreate web
            echo "📋 Trạng thái containers:"
            docker compose ps
          SSHEOF

      - name: Health check — xác minh container đang chạy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'SSHEOF'
            sleep 8
            STATUS=$(docker inspect --format='{{.State.Status}}' hotelbooking_web 2>/dev/null)
            echo "Container status: $STATUS"
            if [ "$STATUS" != "running" ]; then
              echo "❌ Container không chạy. Thực hiện rollback..."
              cd ${{ secrets.WORK_DIR }}
              docker tag hotelbooking-web:backup hotelbooking-web:latest 2>/dev/null || true
              docker compose up -d --force-recreate web
              exit 1
            fi
            echo "✅ Container đang chạy bình thường"
          SSHEOF

      - name: Dọn dẹp SSH key
        if: always()
        run: rm -rf ~/.ssh
