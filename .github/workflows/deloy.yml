name: CI/CD — PHP Docker Basic

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: CI — Kiểm tra PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring

      - name: Kiểm tra cú pháp các file PHP
        run: |
          ERROR=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "::warning file=$file::PHP syntax error"
              php -l "$file"
              ERROR=1
            else
              echo "OK: $file"
            fi
          done < <(find . -name "*.php" -not -path "./.git/*" -print0)

          if [ "$ERROR" -ne 0 ]; then
            echo "Có file PHP lỗi cú pháp."
          else
            echo "Tất cả file PHP đều hợp lệ."
          fi

          exit 0

  cd:
    name: CD — Build Docker image
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Kiểm tra Dockerfile tồn tại
        run: test -f Dockerfile

      - name: Build Docker image
        run: docker build -t hotelbooking-ci:latest .

      - name: Kiểm tra image đã build
        run: docker images | grep hotelbooking-ci
